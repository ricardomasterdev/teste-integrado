name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    name: Backend (Spring Boot + EJB)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build ejb-module
        run: mvn -B -f back/ejb-module/pom.xml test package

      - name: Build backend-module
        run: mvn -B -f back/backend-module/pom.xml test package

      - name: Upload backend JAR
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: back/backend-module/target/backend.jar
          retention-days: 7

  frontend:
    name: Frontend (Angular 17)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: front/package-lock.json

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Build
        run: npm run build:prod

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: front/dist
          retention-days: 7

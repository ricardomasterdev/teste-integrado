<div class="login-page">
  <div class="login-card">
    <div class="brand">
      <div class="logo">
        <mat-icon>account_balance</mat-icon>
      </div>
      <h1>SGB</h1>
      <p class="subtitle">Sistema de Gestão de Benefícios</p>
    </div>

    @if (loading()) { <mat-progress-bar mode="indeterminate"></mat-progress-bar> }

    <form [formGroup]="form" (ngSubmit)="submit()" class="login-form">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Usuário</mat-label>
        <input matInput formControlName="username" autocomplete="username" required>
        <mat-icon matSuffix>person</mat-icon>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Senha</mat-label>
        <input matInput
               [type]="hidePw() ? 'password' : 'text'"
               formControlName="password"
               autocomplete="current-password" required>
        <button type="button" mat-icon-button matSuffix (click)="hidePw.set(!hidePw())">
          <mat-icon>{{ hidePw() ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
      </mat-form-field>

      <button mat-raised-button color="primary" type="submit"
              class="full-width submit-btn"
              [disabled]="form.invalid || loading()">
        <mat-icon>login</mat-icon>
        Entrar
      </button>
    </form>

    <div class="hint">
      <small>Usuário padrão: <b>teste</b> / senha: <b>123456</b></small>
    </div>
  </div>
  <footer class="footer">
    © {{ year }} — Desenvolvido por Ricardo Ribeiro Gonçalves
  </footer>
</div>

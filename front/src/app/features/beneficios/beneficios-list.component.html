<section class="beneficios">
  <app-page-header title="Benefícios" subtitle="Gestão de benefícios — CRUD e transferências">
    <button mat-stroked-button color="primary" (click)="openTransfer()">
      <mat-icon>compare_arrows</mat-icon> Transferir
    </button>
    <button mat-raised-button color="primary" (click)="openForm()">
      <mat-icon>add</mat-icon> Novo benefício
    </button>
  </app-page-header>

  <div class="ti-card">
    <div class="table-toolbar">
      <mat-form-field appearance="outline" subscriptSizing="dynamic" class="search">
        <mat-label>Buscar por nome</mat-label>
        <input matInput [ngModel]="filter" (ngModelChange)="onFilterChange($event)">
        <mat-icon matSuffix>search</mat-icon>
      </mat-form-field>
      <span class="text-muted">{{ total() }} registros</span>
    </div>

    @if (loading()) { <mat-progress-bar mode="indeterminate"></mat-progress-bar> }

    <table mat-table [dataSource]="data" matSort class="full-width">
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>#</th>
        <td mat-cell *matCellDef="let b">{{ b.id }}</td>
      </ng-container>

      <ng-container matColumnDef="nome">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Nome</th>
        <td mat-cell *matCellDef="let b">{{ b.nome }}</td>
      </ng-container>

      <ng-container matColumnDef="descricao">
        <th mat-header-cell *matHeaderCellDef>Descrição</th>
        <td mat-cell *matCellDef="let b" class="text-muted">{{ b.descricao }}</td>
      </ng-container>

      <ng-container matColumnDef="valor">
        <th mat-header-cell *matHeaderCellDef mat-sort-header class="right">Valor</th>
        <td mat-cell *matCellDef="let b" class="right mono">
          {{ b.valor | currency:'BRL' }}
        </td>
      </ng-container>

      <ng-container matColumnDef="ativo">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let b">
          <span class="status-chip" [class.status-ok]="b.ativo" [class.status-muted]="!b.ativo">
            <mat-icon>{{ b.ativo ? 'check_circle' : 'block' }}</mat-icon>
            {{ b.ativo ? 'Ativo' : 'Inativo' }}
          </span>
        </td>
      </ng-container>

      <ng-container matColumnDef="acoes">
        <th mat-header-cell *matHeaderCellDef class="right">Ações</th>
        <td mat-cell *matCellDef="let b" class="right">
          <button mat-icon-button color="primary" (click)="openDetails(b)" matTooltip="Detalhes">
            <mat-icon>visibility</mat-icon>
          </button>
          <button mat-icon-button color="primary" (click)="openTransferFor(b)" matTooltip="Transferir">
            <mat-icon>compare_arrows</mat-icon>
          </button>
          <button mat-icon-button (click)="openForm(b)" matTooltip="Editar">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="delete(b)" matTooltip="Remover">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayed"></tr>
      <tr mat-row *matRowDef="let row; columns: displayed;"></tr>

      <tr *matNoDataRow>
        <td class="no-data" [attr.colspan]="displayed.length">
          Nenhum benefício encontrado.
        </td>
      </tr>
    </table>

    <div class="paginator-wrapper">
      <mat-paginator
        [length]="total()"
        [pageSize]="size"
        [pageIndex]="page"
        [pageSizeOptions]="[5,10,20,50]"
        (page)="onPage($event)"
        showFirstLastButtons>
      </mat-paginator>
    </div>
  </div>
</section>

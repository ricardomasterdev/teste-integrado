server:
  port: ${SERVER_PORT:8090}
  servlet:
    context-path: /teste-integrado/api
  forward-headers-strategy: framework
  compression:
    enabled: true

spring:
  application:
    name: teste-integrado-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:prod}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc.lob.non_contextual_creation: true
        default_schema: public
    open-in-view: false

  main:
    banner-mode: off

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: when_authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    disable-swagger-default-url: true

app:
  jwt:
    secret: ${APP_JWT_SECRET:change-me-to-a-strong-32byte-secret-key!!}
    expiration-ms: ${APP_JWT_EXPIRATION_MS:28800000}  # 8h
    issuer: teste-integrado

logging:
  level:
    root: INFO
    com.example: INFO
    org.hibernate.SQL: WARN

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:postgresql://${DB_HOST:177.53.148.179}:${DB_PORT:5432}/${DB_NAME:teste_integrado}
    username: ${DB_USER:codex}
    password: ${DB_PASSWORD:Ric@7901}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      connection-timeout: 20000
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:mem:teste_integrado;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
      platform: h2

---
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: none
  sql:
    init:
      mode: always
      platform: h2
      schema-locations: classpath:schema-h2.sql
      data-locations:   classpath:data-h2.sql

server:
  servlet:
    context-path: /
  port: 0
